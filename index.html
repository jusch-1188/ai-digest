<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Digest</title>
<meta name="description" content="Your personal daily AI news digest">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.9.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="/app.3c913c2d.css">
</head>
<body>

<!-- ═══════ HEADER ═══════ -->
<header>
  <div class="header-inner">
    <a class="logo" href="#">
      <i class="ti ti-brain logo-icon"></i>
      <span>AI Digest</span>
    </a>
    <div class="header-spacer"></div>
    <nav class="date-nav">
      <button class="date-btn" id="prevDay" title="Previous day" aria-label="Previous day">
        <i class="ti ti-chevron-left"></i>
      </button>
      <span class="date-label" id="dateLabel" title="Click for today"></span>
      <button class="date-btn" id="nextDay" title="Next day" aria-label="Next day">
        <i class="ti ti-chevron-right"></i>
      </button>
    </nav>
  </div>
</header>

<!-- ═══════ TOOLBAR ═══════ -->
<div class="toolbar">
  <!-- Search -->
  <div class="search-wrap">
    <i class="ti ti-search"></i>
    <input type="search" id="searchInput" placeholder="Search headlines, summaries…" autocomplete="off">
  </div>

  <div class="filter-divider"></div>

  <!-- Section filter -->
  <div class="filter-group section-group" role="group" aria-label="Filter by section">
    <button class="pill active sec-all"      data-section="all">All</button>
    <button class="pill sec-models"          data-section="models">Models</button>
    <button class="pill sec-industry"        data-section="industry">Industry</button>
    <button class="pill sec-tips"            data-section="tips">Tips</button>
  </div>

  <div class="filter-divider"></div>

  <!-- Period filter -->
  <div class="filter-group period" role="group" aria-label="Filter by period">
    <button class="pill"        data-period="today">Today</button>
    <button class="pill active" data-period="this-week">This Week</button>
    <button class="pill"        data-period="last-week">Last Week</button>
    <button class="pill"        data-period="this-month">This Month</button>
    <button class="pill"        data-period="all">All</button>
  </div>

  <div class="filter-divider"></div>

  <!-- Model filter -->
  <div class="filter-group model-group" role="group" aria-label="Filter by model">
    <button class="pill active" data-model="all">All models</button>
    <button class="pill" data-model="gpt">GPT</button>
    <button class="pill" data-model="claude">Claude</button>
    <button class="pill" data-model="gemini">Gemini</button>
    <button class="pill" data-model="llama">Llama</button>
    <button class="pill" data-model="deepseek">DeepSeek</button>
    <button class="pill" data-model="grok">Grok</button>
    <button class="pill" data-model="mistral">Mistral</button>
  </div>
</div>

<!-- ═══════ RESULT BAR ═══════ -->
<div class="result-bar" id="resultBar"></div>

<!-- ═══════ CARD GRID ═══════ -->
<main id="cardGrid" aria-live="polite"></main>

<script src="/app.f98ec2a9.js"></script>
</body>
</html>
